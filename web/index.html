<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic IDE</title>
    <link rel="stylesheet" href="css/main.css">
    <!-- Monaco Editor Loader -->
    <script src="https://unpkg.com/monaco-editor@0.45.0/min/vs/loader.min.js"></script>
</head>
<body>
    <div id="app">
        <header id="header">
            <h1>Magic IDE</h1>
            <div id="toolbar">
                <button id="new-file">New File</button>
                <button id="open-file">Open File</button>
                <button id="save-file">Save</button>
                <button id="find-replace">Find/Replace</button>
                <button id="settings">Settings</button>
            </div>
        </header>
        <div id="main-content">
            <aside id="sidebar">
                <div id="file-explorer">
                    <h3>File Explorer</h3>
                    <div id="file-tree"></div>
                </div>
            </aside>
            <main id="editor-container">
                <div id="editor-tabs"></div>
                <div id="editor-wrapper">
                    <div id="monaco-editor"></div>
                </div>
                <div id="terminal-container" style="display: none;">
                    <div id="terminal"></div>
                </div>
            </main>
        </div>
        <footer id="status-bar">
            <span id="status-message">Ready</span>
            <span id="cursor-position"></span>
            <span id="file-info"></span>
        </footer>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <h3>Settings</h3>
            <div id="settings-content"></div>
            <button id="close-settings">Close</button>
        </div>
    </div>

    <!-- Find/Replace Modal -->
    <div id="find-replace-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <h3>Find & Replace</h3>
            <input type="text" id="find-text" placeholder="Find">
            <input type="text" id="replace-text" placeholder="Replace with">
            <button id="find-next">Find Next</button>
            <button id="replace">Replace</button>
            <button id="replace-all">Replace All</button>
            <button id="close-find-replace">Close</button>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
